<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 20px }
        h2 { margin-top: 20px }
        .section { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 6px }
        .links a { display:block; margin:6px 0 }
    </style>
</head>
<body>
<h1>Dashboard</h1>

<div class="section">
    <h2>Stock & WatchList</h2>
    <div class="links">
        <a th:href="@{/stock-watchlist/stocks}">All Stocks</a>
        <a th:href="@{/stock-watchlist/watchlists}">All Watchlists</a>
        <a th:href="@{/stock-watchlist/stocks/new}">Add Stock</a>
        <a th:href="@{/stock-watchlist/watchlists/new}">Add Watchlist</a>
        <a th:href="@{/stock-watchlist/mapping}">Watchlist &amp; Stock Mapping</a>
    </div>
</div>

<div class="section">
    <h2>Earning Collection</h2>
    <div class="links">
        <a th:href="@{/earnings}">Earnings List</a>
        <a th:href="@{/earnings/new}">Add Earnings Entry</a>
        <a th:href="@{/earnings/bulk}">Bulk Upload Earnings</a>
    </div>
</div>

<div class="section">
    <h2>Day Events</h2>
    <div class="links">
        <a th:href="@{/day-event}">Manage Day Events</a>
        <a th:href="@{/day-event/mapping}">Day Event Mappings</a>
        <a th:href="@{/day-event/mapping/bulk}">Bulk Upload Mappings</a>
        <a th:href="@{/day-event/populate-watchlist}">Populate Watch Ticker</a>
        <a th:href="@{/day-event/entries}">Day Event Entries</a>
    </div>
</div>

</body>
</html>
