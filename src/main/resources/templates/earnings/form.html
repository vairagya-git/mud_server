<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${ed.id} == null ? 'Create' : 'Edit'">Earnings Form</title>
    <style>
        label { display:block; margin-top:8px }
    </style>
</head>
<body>
<h1 th:text="${ed.id} == null ? 'Create Earnings Entry' : 'Edit Earnings Entry'"></h1>

<form th:action="@{/earnings}" method="post">
    <input type="hidden" name="id" th:value="${ed.id}" />

    <label>Stock (searchable):
        <input type="text" id="stockSearch" placeholder="Search ticker..." />
        <select id="stockSelect" name="stockId" size="6" required>
                <option th:each="s : ${stocks}"
                    th:value="${s.id}"
                    th:text="${s.ticker}"
                    th:selected="${ed.stockId} == s.id"></option>
        </select>
    </label>

    <!-- Ticker is derived from selected Stock; no separate input -->

    <label>Quarter:
        <input type="text" name="quarter" th:value="${ed.quarter}" />
    </label>

    <label>Release Time:
        <select name="releaseTime" required>
                <option th:each="rt : ${releaseOptions}"
                    th:value="${rt}"
                    th:text="${rt}"
                    th:selected="${ed.releaseTime} == rt"></option>
        </select>
    </label>

    <label>Earnings Date:
        <input type="date" name="earningsDate" th:value="${ed.earningsDate}" />
    </label>

    <div style="margin-top:10px">
        <button type="submit">Save</button>
        <a th:href="@{/earnings}">Cancel</a>
    </div>
</form>

    <script>
    // simple client-side filter for select options
    const search = document.getElementById('stockSearch');
    const select = document.getElementById('stockSelect');
    search.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        for (let i=0;i<select.options.length;i++){
            const opt = select.options[i];
            const txt = opt.text.toLowerCase();
            opt.hidden = q && txt.indexOf(q) === -1;
        }
    });
</script>

</body>
</html>
