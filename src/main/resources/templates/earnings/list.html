<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Earnings Dates</title>
</head>
<body>
<h1>Earnings Dates</h1>
<p><a th:href="@{/earnings/new}">Create new earnings entry</a></p>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Stock (Ticker)</th>
        <th>Quarter</th>
        <th>Release Time</th>
        <th>State</th>
        <th>Earnings Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ed : ${list}">
        <td th:text="${ed.id}"></td>
        <td th:text="${ed.stockSymbol}"></td>
        <td th:text="${ed.quarter}"></td>
        <td th:text="${ed.releaseTime}"></td>
        <td th:text="NEW"></td>
        <td th:text="${ed.earningsDate}"></td>
        <td>
            <a th:href="@{/earnings/{id}/edit(id=${ed.id})}">Edit</a>
            <form th:action="@{/earnings/{id}/delete(id=${ed.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
