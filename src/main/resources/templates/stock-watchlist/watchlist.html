<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Watchlists — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header"><h1>All Watchlists</h1></div>
    <div class="actions-bar">
        <a href="/stock-watchlist/watchlists/new" hx-get="/stock-watchlist/watchlists/new" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-primary">+ Add Watchlist</a>
    </div>
    <div class="card table-wrap">
        <table>
            <thead><tr><th>ID</th><th>Code</th><th>Name</th><th></th></tr></thead>
            <tbody>
                <tr th:each="w : ${watchlists}">
                    <td th:text="${w.id}"></td>
                    <td><code th:text="${w.code}"></code></td>
                    <td th:text="${w.name}"></td>
                    <td><a th:href="@{/stock-watchlist/watchlists/{id}(id=${w.id})}" class="btn btn-sm btn-secondary">View</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
