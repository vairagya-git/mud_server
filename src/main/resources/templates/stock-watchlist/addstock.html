<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Stock</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 20px }
        label { display:block; margin:8px 0 }
        input[type=text] { padding:8px; width:300px }
        button { margin-top:12px }
    </style>
</head>
<body>
<h1>Add New Stock</h1>
<form th:action="@{/stock-watchlist/stock}" method="post">
    <label>Ticker:
        <input type="text" name="ticker" />
    </label>
    <label>Name:
        <input type="text" name="name" />
    </label>
    <label>CUSIP: <small style="color:#666">required</small>
        <input type="text" name="cusip" required />
    </label>
    <label>CIK: <small style="color:#666">required</small>
        <input type="text" name="cik" required />
    </label>
    <label>CL: <small style="color:#666">required</small>
        <input type="text" name="cl" required />
    </label>
    <label>Country: <small style="color:#666">required</small>
        <input type="text" name="country" required />
    </label>
    <label>Investor Page:
        <input type="text" name="investor_page" />
    </label>
    <label>Sector:
        <input type="text" name="sector" />
    </label>
    <button type="submit">Create Stock</button>
</form>

<p><a th:href="@{/stock-watchlist/stocks}">Back to Stocks</a></p>
</body>
</html>
