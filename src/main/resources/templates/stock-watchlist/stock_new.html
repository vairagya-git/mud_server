<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>New Stock — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header"><h1>Add New Stock</h1></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div class="card" style="max-width:480px">
        <form th:action="@{/stock-watchlist/stock/new}" method="post">
            <div class="form-group"><label>Ticker *</label><input type="text" name="ticker" required /></div>
            <div class="form-group"><label>Name *</label><input type="text" name="name" required /></div>
            <div class="form-group"><label>CUSIP</label><input type="text" name="cusip" /></div>
            <div class="form-group"><label>CIK</label><input type="text" name="cik" /></div>
            <div class="form-group"><label>CL</label><input type="text" name="cl" /></div>
            <div class="form-group"><label>Country</label><input type="text" name="country" /></div>
            <div class="form-group"><label>Investor Page</label><input type="text" name="investorPage" /></div>
            <div class="form-group"><label>Sector</label><input type="text" name="sector" /></div>
            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Create Stock</button>
                <a href="/stock-watchlist/stocks" hx-get="/stock-watchlist/stocks" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
