<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Add Watchlist — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header"><h1>Add Watchlist</h1></div>
    <div class="card" style="max-width:400px">
        <form th:action="@{/stock-watchlist/watchlist}" method="post">
            <div class="form-group"><label>Name</label><input type="text" name="name" required /></div>
            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Create Watchlist</button>
                <a href="/stock-watchlist/watchlists" hx-get="/stock-watchlist/watchlists" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
