<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Stocks</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 20px }
        table { border-collapse: collapse; width: 100% }
        th, td { border: 1px solid #ddd; padding: 8px }
        th { background:#f4f4f4 }
    </style>
</head>
<body>
<h1>All Stocks</h1>
<table>
    <thead>
    <tr><th>ID</th><th>Ticker</th><th>Name</th><th>CUSIP</th><th>CIK</th><th>CL</th><th>Country</th></tr>
    </thead>
    <tbody>
    <tr th:each="s : ${stocks}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.ticker}"></td>
        <td th:text="${s.name}"></td>
        <td th:text="${s.cusip}"></td>
        <td th:text="${s.cik}"></td>
        <td th:text="${s.cl}"></td>
        <td th:text="${s.country}"></td>
    </tr>
    </tbody>
</table>
<p><a th:href="@{/}">Back to Home</a></p>
<p><a th:href="@{/stock-watchlist/stocks/new}">Add New Stock</a> • <a th:href="@{/stock-watchlist/watchlists/new}">Add Watchlist</a></p>
</body>
</html>
