<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Watchlist Mapping — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Watchlist Stock Mapping</h1>
        <div class="subtitle">Bulk-add stocks to a watchlist via CSV.</div>
    </div>
    <div class="card" style="max-width:640px">
        <form th:action="@{/stock-watchlist/mapping}" method="post">
            <div class="form-group">
                <label>Watchlist</label>
                <select name="watchlistId" required>
                    <option value="">-- select --</option>
                    <option th:each="w : ${watchlists}" th:value="${w.id}" th:text="${w.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Stock tickers (one per line)</label>
                <textarea name="tickers" rows="10" style="max-width:100%;font-family:monospace" placeholder="AAPL&#10;MSFT&#10;GOOG"></textarea>
            </div>
            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Save Mapping</button>
                <a href="/stock-watchlist/watchlists" hx-get="/stock-watchlist/watchlists" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
