<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>System Config — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>System Config</h1>
        <div class="subtitle">All configuration entries. Total: <strong th:text="${configs.size()}">0</strong>.</div>
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${sections == null or sections.isEmpty()}" class="card table-wrap">
        <div class="table-empty">No config entries found.</div>
    </div>

    <div th:each="section : ${sections}" class="card table-wrap" style="margin-bottom:16px;">
        <div style="font-weight:700;margin-bottom:4px;" th:text="${section.title}"></div>
        <div class="subtitle" th:if="${section.description != null and !section.description.isBlank()}" th:text="${section.description}">dafdasfds</div>

        <div th:if="${section.fields == null or section.fields.isEmpty()}" class="table-empty" style="margin-top:10px;">
            No editable config fields in this section.
        </div>

        <table th:unless="${section.fields == null or section.fields.isEmpty()}" style="margin-top:10px;">
            <thead><tr><th>#</th><th>Code</th><th>Value</th><th>Type</th><th>Description</th><th>Updated At</th><th></th></tr></thead>
            <tbody>
                <tr th:each="row, stat : ${section.fields}">
                    <td th:text="${stat.count}"></td>
                    <td><code th:text="${row.code}"></code></td>
                    <td th:text="${row.value}"></td>
                    <td><span class="badge badge-blue" th:text="${row.type}"></span></td>
                    <td th:text="${row.description}"></td>
                    <td th:text="${row.updatedAt != null ? #temporals.format(row.updatedAt, 'yyyy-MM-dd HH:mm') : '&#8212;'}"></td>
                    <td><a th:href="@{/system-config/{c}/edit(c=${row.code},purpose=${row.purpose})}" class="btn btn-sm btn-primary">Edit</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
