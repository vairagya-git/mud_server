<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Analyst Firms — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Analyst Rating Firms</h1>
        <div class="subtitle">Firms sourced from Benzinga. Total: <strong th:text="${firms.size()}">0</strong> firm(s).</div>
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div class="actions-bar">
        <form th:action="@{/analyst-rating/firms/sync}" method="post" style="display:inline">
            <button type="submit" class="btn btn-primary">&#8635; Sync from Benzinga</button>
        </form>
    </div>
    <div class="card table-wrap">
        <div th:if="${firms.isEmpty()}" class="table-empty">No firms loaded yet. Click Sync to populate.</div>
        <table th:unless="${firms.isEmpty()}">
            <thead><tr><th>#</th><th>Benzinga ID</th><th>Name</th><th>Currency</th><th>Last Updated</th><th>Created At</th></tr></thead>
            <tbody>
                <tr th:each="firm, stat : ${firms}">
                    <td th:text="${stat.count}"></td>
                    <td><code th:text="${firm.benzingaFirmId}"></code></td>
                    <td th:text="${firm.name}"></td>
                    <td><span th:if="${firm.currency}" class="badge badge-blue" th:text="${firm.currency}"></span><span th:unless="${firm.currency}" style="color:#aaa">&#8212;</span></td>
                    <td th:text="${firm.lastUpdated != null ? firm.lastUpdated : '&#8212;'}"></td>
                    <td th:text="${firm.createdAt != null ? #temporals.format(firm.createdAt, 'yyyy-MM-dd HH:mm') : '&#8212;'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
