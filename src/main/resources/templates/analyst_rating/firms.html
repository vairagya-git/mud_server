<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analyst Rating Firms</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 16px; }
        h1   { margin-bottom: 6px; }
        .subtitle { color: #555; font-size: 0.9em; margin-bottom: 16px; }
        .actions { margin-bottom: 14px; display: flex; gap: 10px; align-items: center; }
        .btn {
            display: inline-block; padding: 7px 14px; border-radius: 5px;
            text-decoration: none; font-size: 0.9em; cursor: pointer; border: none;
        }
        .btn-primary { background: #0366d6; color: #fff; }
        .btn-primary:hover { background: #024ea4; }
        .msg  { padding: 10px; border-radius: 6px; margin-bottom: 12px; background: #e6ffed; border: 1px solid #34d058; }
        .err  { padding: 10px; border-radius: 6px; margin-bottom: 12px; background: #ffeef0; border: 1px solid #d73a49; }
        table { border-collapse: collapse; width: 100%; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        th { background: #f3f4f6; font-weight: 600; }
        tr:nth-child(even) { background: #fafafa; }
        tr:hover { background: #eef5ff; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.8em; background: #dbeafe; color: #1d4ed8;
        }
        .empty { color: #888; font-style: italic; padding: 16px 0; }
    </style>
</head>
<body>

<h1>Analyst Rating Firms</h1>
<p class="subtitle">Firms data sourced from Benzinga. Total: <strong th:text="${firms.size()}">0</strong> firm(s).</p>

<div th:if="${message}" class="msg" th:text="${message}"></div>
<div th:if="${error}"   class="err" th:text="${error}"></div>

<div class="actions">
    <form th:action="@{/analyst-rating/firms/sync}" method="post" style="display:inline">
        <button type="submit" class="btn btn-primary">&#8635; Sync Firms from Benzinga</button>
    </form>
    <a th:href="@{/}" style="font-size:0.9em; color:#0366d6;">&#8592; Back to Home</a>
</div>

<div th:if="${firms.isEmpty()}" class="empty">No firms loaded yet. Click "Sync Firms from Benzinga" to populate.</div>

<table th:unless="${firms.isEmpty()}">
    <thead>
        <tr>
            <th>#</th>
            <th>Benzinga Firm ID</th>
            <th>Name</th>
            <th>Currency</th>
            <th>Last Updated</th>
            <th>Created At</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="firm, stat : ${firms}">
            <td th:text="${stat.count}">1</td>
            <td><code th:text="${firm.benzingaFirmId}">id</code></td>
            <td th:text="${firm.name}">Firm Name</td>
            <td>
                <span th:if="${firm.currency}" class="badge" th:text="${firm.currency}">USD</span>
                <span th:unless="${firm.currency}" style="color:#aaa;">—</span>
            </td>
            <td th:text="${firm.lastUpdated != null ? firm.lastUpdated : '—'}">2024-08-21</td>
            <td th:text="${firm.createdAt != null ? #temporals.format(firm.createdAt, 'yyyy-MM-dd HH:mm') : '—'}">2024-08-21 05:22</td>
        </tr>
    </tbody>
</table>

</body>
</html>
