<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Analysts — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">

    <div class="page-header">
        <h1>Analysts</h1>
        <div class="subtitle">All analysts with performance metrics. Total: <strong th:text="${analysts.size()}">0</strong></div>
    </div>

    <div class="card table-wrap">
        <div th:if="${analysts.isEmpty()}" class="table-empty">No analysts loaded yet. Sync firms first, then run the analyst sync scheduler.</div>
        <table th:unless="${analysts.isEmpty()}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Firm</th>
                    <th>Analyst</th>
                    <th>Benzinga ID</th>
                    <th>Smart Score</th>
                    <th>Avg Return</th>
                    <th>Avg Return %ile</th>
                    <th>Success Rate</th>
                    <th>Total Ratings</th>
                    <th>Ratings %ile</th>
                    <th>Last Updated</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a, stat : ${analysts}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${a.firm_name}"></td>
                    <td><strong th:text="${a.full_name}"></strong></td>
                    <td><code th:text="${a.benzinga_analyst_id}"></code></td>
                    <td th:text="${a.smart_score}"></td>
                    <td th:text="${a.overall_avg_return}"></td>
                    <td th:text="${a.overall_avg_return_percentile}"></td>
                    <td th:text="${a.overall_success_rate}"></td>
                    <td th:text="${a.total_ratings}"></td>
                    <td th:text="${a.total_ratings_percentile}"></td>
                    <td th:text="${a.last_updated != null ? a.last_updated : '&#8212;'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
