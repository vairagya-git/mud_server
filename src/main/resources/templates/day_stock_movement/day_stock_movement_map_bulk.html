<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bulk Day Stock Movement Mappings</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;padding:12px} textarea{width:100%;height:200px}</style>
</head>
<body>
<h1>Bulk Day Stock Movement Mappings</h1>
<div th:if="${marketClosedWarning}" style="color:orange;border:1px solid orange;padding:8px;margin-bottom:12px">
    <strong>Market Closed:</strong> <span th:text="${marketClosedWarning}"></span>
</div>
<div th:if="${bulkMessage}" style="color:green;border:1px solid green;padding:8px;margin-bottom:12px">
    <span th:text="${bulkMessage}"></span>
</div>
<p>Enter lines with <strong>ticker,code</strong> per line.</p>
<form th:action="@{/day-stock-movement/mapping/bulk}" method="post">
    <textarea name="bulkData" placeholder="PANW,PAYROLL_EVENT"></textarea>
    <div style="margin-top:8px">
        <button type="submit">Upload</button>
        <a th:href="@{/day-stock-movement/mapping}">Back</a>
    </div>
</form>
</body>
</html>
