<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>DSM Bulk Mapping — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Bulk DSM Mapping</h1>
        <div class="subtitle">Format per line: <code>KeyDate (yyyy-MM-dd), Ticker</code></div>
    </div>
    <div class="card" style="max-width:640px">
        <form th:action="@{/day-stock-movement/mapping/bulk}" method="post">
            <div class="form-group">
                <textarea name="bulkData" rows="12" style="max-width:100%;font-family:monospace" placeholder="2026-06-01, AAPL&#10;2026-06-01, MSFT"></textarea>
            </div>
            <div class="actions-bar">
                <button type="submit" class="btn btn-primary">Upload</button>
                <a href="/day-stock-movement" hx-get="/day-stock-movement" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
