<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Day Stock Movement Keys — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header"><h1>Day Stock Movement Keys</h1></div>
    <div th:if="${csvMessage}" class="alert alert-success" th:text="${csvMessage}"></div>
    <div class="actions-bar" style="display:flex;gap:16px;flex-wrap:wrap">
        <form th:action="@{/day-stock-movement}" method="post" style="display:flex;gap:8px;align-items:flex-end">
            <div class="form-group" style="margin:0">
                <label>Code</label>
                <input type="text" name="code" placeholder="e.g. 2026-06-01" required />
            </div>
            <div class="form-group" style="margin:0">
                <label>Description</label>
                <input type="text" name="description" placeholder="optional" />
            </div>
            <div class="form-group" style="margin:0">
                <label>Date</label>
                <input type="date" name="event_date" />
            </div>
            <button type="submit" class="btn btn-primary">+ Add Key</button>
        </form>
    </div>
    <div class="card table-wrap" style="margin-top:20px">
        <div th:if="${events.isEmpty()}" class="table-empty">No keys yet.</div>
        <table id="dayStockMovementKeyTable" th:unless="${events.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Description</th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" id="sortDayStockDateBtn" data-dir="desc">
                            Date <span id="dayStockDateSortIndicator">↓</span>
                        </button>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="k : ${events}">
                    <td th:text="${k.id}"></td>
                    <td><code th:text="${k.code}"></code></td>
                    <td th:text="${k.description != null ? k.description : '&#8212;'}"></td>
                    <td th:attr="data-sort-value=${k.date != null ? k.date : ''}" th:text="${k.date != null ? k.date : '&#8212;'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var table = document.getElementById('dayStockMovementKeyTable');
            var sortBtn = document.getElementById('sortDayStockDateBtn');
            var indicator = document.getElementById('dayStockDateSortIndicator');
            if (!table || !sortBtn || !table.tBodies.length) return;

            function parseDateValue(row) {
                var raw = (row.children[3].dataset.sortValue || '').trim();
                if (!raw) return Number.NEGATIVE_INFINITY;
                var ts = Date.parse(raw);
                return Number.isNaN(ts) ? Number.NEGATIVE_INFINITY : ts;
            }

            function sortRows(dir) {
                var tbody = table.tBodies[0];
                var rows = Array.from(tbody.rows);
                rows.sort(function (a, b) {
                    var av = parseDateValue(a);
                    var bv = parseDateValue(b);
                    if (av < bv) return dir === 'asc' ? -1 : 1;
                    if (av > bv) return dir === 'asc' ? 1 : -1;
                    return 0;
                });
                rows.forEach(function (row) { tbody.appendChild(row); });
                indicator.textContent = dir === 'asc' ? '↑' : '↓';
                sortBtn.dataset.dir = dir;
            }

            sortBtn.addEventListener('click', function () {
                var nextDir = sortBtn.dataset.dir === 'asc' ? 'desc' : 'asc';
                sortRows(nextDir);
            });

            sortRows('desc');
        }());
    </script>
</div>
</body>
</html>
