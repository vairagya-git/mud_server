<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>DSM Entries — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <style>
        .dsm-sticky-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: var(--bg);
            padding-top: 6px;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .dsm-sticky-filter {
            position: sticky;
            top: 56px;
            z-index: 25;
            background: #f7f7f7;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .dsm-filter-input {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            margin-left: 6px;
        }

        .dsm-filter-input input {
            width: 130px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.82rem;
            text-transform: uppercase;
        }
    </style>

    <div class="page-header dsm-sticky-header">
        <h1>Day Stock Movement Entries</h1>
        <div class="subtitle">Total: <strong th:text="${entries.size()}">0</strong></div>
    </div>

    <form id="entryFilterForm" method="get" th:action="@{/day-stock-movement/entries}">
        <input th:each="t : ${selectedTickers}" type="hidden" name="ticker" th:value="${t}">
        <input th:each="c : ${selectedDayCodes}" type="hidden" name="dayCode" th:value="${c}">
    </form>

    <div class="filter-bar dsm-sticky-filter" style="margin-bottom:16px">
        <span class="filter-bar-label">Filters</span>

        <div class="dsm-filter-input">
            <input id="tickerSearchInput" list="tickerOptions" type="text" placeholder="Search ticker" aria-label="Search ticker">
            <button id="addTickerFilterBtn" type="button" class="btn btn-sm btn-secondary">Add ticker</button>
            <datalist id="tickerOptions">
                <option th:each="t : ${tickers}" th:value="${t}"></option>
            </datalist>
        </div>

        <th:block th:each="t : ${selectedTickers}">
            <span class="chip">
                <span class="chip-type">ticker</span>
                <strong th:text="${t}"></strong>
                <button type="button" class="chip-remove" data-active="1" data-field="ticker" th:data-value="${t}" title="Remove">&#x2715;</button>
            </span>
        </th:block>

        <th:block th:each="c : ${selectedDayCodes}">
            <span class="chip">
                <span class="chip-type">dayCode</span>
                <strong th:text="${c}"></strong>
                <button type="button" class="chip-remove" data-active="1" data-field="dayCode" th:data-value="${c}" title="Remove">&#x2715;</button>
            </span>
        </th:block>

        <span id="pendingChips"></span>

        <span id="filterHint"
              th:if="${selectedTickers.isEmpty() and selectedDayCodes.isEmpty()}"
              class="filter-bar-empty">Click &#x2295; next to a ticker or day code to stage filters, then click Apply (max 10 each)</span>

        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
            <button id="applyFilterBtn" type="button" class="btn btn-sm btn-secondary">Apply</button>
            <a th:if="${!selectedTickers.isEmpty() or !selectedDayCodes.isEmpty()}"
               href="/day-stock-movement/entries" class="btn btn-sm btn-secondary">Clear all</a>
        </div>
    </div>

    <div class="card table-wrap">
        <div th:if="${entries.isEmpty()}" class="table-empty">No entries found. Run the scheduler to populate.</div>
        <table id="dsmEntriesTable" th:unless="${entries.isEmpty()}">
            <thead>
                <tr>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="ticker" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Ticker <span class="sort-indicator" data-for="ticker"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="dayCode" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Day Code <span class="sort-indicator" data-for="dayCode"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="date" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Date <span class="sort-indicator" data-for="date"></span>
                        </button>
                    </th>
                    <th>Open</th>
                    <th>Close</th>
                    <th>High</th>
                    <th>Low</th>
                    <th>Change %</th>
                    <th>OPENCHANGE%</th>
                    <th>Volume</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${entries}">
                    <td th:attr="data-sort-value=${e.ticker}">
                        <span class="badge badge-grey" th:text="${e.ticker}"></span>
                        <button type="button" class="filter-btn" data-field="ticker" th:data-value="${e.ticker}" title="Filter by ticker">&#x2295;</button>
                    </td>
                    <td th:attr="data-sort-value=${e.day_code}">
                        <code th:text="${e.day_code}"></code>
                        <button type="button" class="filter-btn" data-field="dayCode" th:data-value="${e.day_code}" title="Filter by day code">&#x2295;</button>
                    </td>
                    <td th:attr="data-sort-value=${e.master_event_date}" th:text="${e.master_event_date}"></td>
                    <td th:text="${e.cur_day_open}"></td>
                    <td th:text="${e.cur_day_close}"></td>
                    <td th:text="${e.cur_day_high}"></td>
                    <td th:text="${e.cur_day_low}"></td>
                    <td th:text="${e.change_percent}"></td>
                    <td th:text="${e.day_opening_change_percent}"></td>
                    <td th:text="${e.cur_day_volume}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var BASE = '/day-stock-movement/entries';
            var form = document.getElementById('entryFilterForm');
            var pendingChips = document.getElementById('pendingChips');
            var filterHint = document.getElementById('filterHint');
            var table = document.getElementById('dsmEntriesTable');
            var tickerSearchInput = document.getElementById('tickerSearchInput');
            var addTickerFilterBtn = document.getElementById('addTickerFilterBtn');
            var sortState = { key: null, dir: 'asc' };

            function countExisting(field) {
                return form.querySelectorAll('input[name="' + field + '"]').length;
            }

            document.getElementById('applyFilterBtn').addEventListener('click', function () {
                form.submit();
            });

            function stageFilter(field, value) {
                var normalized = (value || '').trim();
                if (!normalized) return;
                if (field === 'ticker') {
                    normalized = normalized.toUpperCase();
                }

                var already = Array.from(form.querySelectorAll('input[name="' + field + '"]')).map(function (i) { return i.value; });
                if (already.includes(normalized)) return;

                if (countExisting(field) >= 10) {
                    return;
                }

                if (filterHint) filterHint.style.display = 'none';

                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = field; inp.value = normalized; inp.dataset.pending = '1';
                form.appendChild(inp);

                var chip = document.createElement('span');
                chip.className = 'chip chip-pending';
                var typeSpan = document.createElement('span');
                typeSpan.className = 'chip-type'; typeSpan.textContent = field;
                var strong = document.createElement('strong');
                strong.textContent = normalized;
                var rmBtn = document.createElement('button');
                rmBtn.type = 'button'; rmBtn.className = 'chip-remove'; rmBtn.title = 'Remove';
                rmBtn.dataset.pending = '1'; rmBtn.dataset.field = field; rmBtn.dataset.value = normalized;
                rmBtn.textContent = '\u2715';
                chip.appendChild(typeSpan);
                chip.appendChild(document.createTextNode('\u00a0'));
                chip.appendChild(strong);
                chip.appendChild(document.createTextNode('\u00a0'));
                chip.appendChild(rmBtn);
                pendingChips.appendChild(chip);
            }

            if (addTickerFilterBtn) {
                addTickerFilterBtn.addEventListener('click', function () {
                    stageFilter('ticker', tickerSearchInput ? tickerSearchInput.value : '');
                    if (tickerSearchInput) tickerSearchInput.value = '';
                });
            }

            if (tickerSearchInput) {
                tickerSearchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        stageFilter('ticker', tickerSearchInput.value);
                        tickerSearchInput.value = '';
                    }
                });
            }

            function compareValues(a, b, sortKey) {
                if (sortKey === 'date') {
                    var da = Date.parse(a || '');
                    var db = Date.parse(b || '');
                    if (isNaN(da) && isNaN(db)) return 0;
                    if (isNaN(da)) return -1;
                    if (isNaN(db)) return 1;
                    return da - db;
                }
                return String(a || '').localeCompare(String(b || ''), undefined, { sensitivity: 'base' });
            }

            function updateSortIndicators() {
                document.querySelectorAll('.sort-indicator').forEach(function (el) {
                    var key = el.dataset.for;
                    if (sortState.key !== key) {
                        el.textContent = '';
                        return;
                    }
                    el.textContent = sortState.dir === 'asc' ? '\u2191' : '\u2193';
                });
            }

            function sortTable(sortKey) {
                if (!table) return;
                var tbody = table.querySelector('tbody');
                if (!tbody) return;

                if (sortState.key === sortKey) {
                    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState.key = sortKey;
                    sortState.dir = 'asc';
                }

                var indexByKey = { ticker: 0, dayCode: 1, date: 2 };
                var colIndex = indexByKey[sortKey];
                var rows = Array.from(tbody.querySelectorAll('tr'));

                rows.sort(function (r1, r2) {
                    var v1 = (r1.children[colIndex] && r1.children[colIndex].dataset.sortValue) || '';
                    var v2 = (r2.children[colIndex] && r2.children[colIndex].dataset.sortValue) || '';
                    var cmp = compareValues(v1, v2, sortKey);
                    return sortState.dir === 'asc' ? cmp : -cmp;
                });

                rows.forEach(function (row) { tbody.appendChild(row); });
                updateSortIndicators();
            }

            document.querySelectorAll('.table-sort-btn[data-sort-key]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    sortTable(btn.dataset.sortKey);
                });
            });

            document.addEventListener('click', function (e) {
                var rmActive = e.target.closest('.chip-remove[data-active]');
                if (rmActive) {
                    var p = new URLSearchParams(window.location.search);
                    var remaining = p.getAll(rmActive.dataset.field).filter(function (v) { return v !== rmActive.dataset.value; });
                    p.delete(rmActive.dataset.field);
                    remaining.forEach(function (v) { p.append(rmActive.dataset.field, v); });
                    window.location.href = BASE + (p.toString() ? '?' + p.toString() : '');
                    return;
                }

                var rmPending = e.target.closest('.chip-remove[data-pending]');
                if (rmPending) {
                    var match = Array.from(form.querySelectorAll('input[data-pending][name="' + rmPending.dataset.field + '"]'))
                        .find(function (inp) { return inp.value === rmPending.dataset.value; });
                    if (match) match.remove();
                    rmPending.closest('.chip').remove();
                    if (filterHint && pendingChips.children.length === 0) filterHint.style.display = '';
                    return;
                }

                var add = e.target.closest('.filter-btn[data-field]');
                if (add) {
                    var field = add.dataset.field;
                    var value = add.dataset.value;
                    stageFilter(field, value);
                }
            });
        })();
    </script>
</div>
</body>
</html>
