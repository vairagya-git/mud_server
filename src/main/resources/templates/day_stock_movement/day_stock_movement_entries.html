<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>DSM Entries — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <style>
        .dsm-sticky-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: var(--bg);
            padding-top: 6px;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .dsm-sticky-filter {
            position: sticky;
            top: 56px;
            z-index: 25;
            background: #f7f7f7;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .dsm-filter-input {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            margin-left: 6px;
        }

        .dsm-filter-input input {
            width: 130px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.82rem;
            text-transform: uppercase;
        }
    </style>

    <div class="page-header dsm-sticky-header">
        <h1>Day Stock Movement Entries</h1>
        <div class="subtitle">Total: <strong th:text="${entries.size()}">0</strong></div>
    </div>

    <div class="filter-bar dsm-sticky-filter" style="margin-bottom:16px">
        <span class="filter-bar-label">Filters</span>

        <div class="dsm-filter-input">
            <input id="tickerSearchInput" list="tickerOptions" type="text" placeholder="Search ticker" aria-label="Search ticker">
            <button id="addTickerFilterBtn" type="button" class="btn btn-sm btn-secondary">Add ticker</button>
            <datalist id="tickerOptions">
                <option th:each="t : ${tickers}" th:value="${t}"></option>
            </datalist>
        </div>

        <div class="dsm-filter-input">
            <input id="dateSearchInput" list="dateOptions" type="text" placeholder="YYYY-MM-DD" aria-label="Search date">
            <button id="addDateFilterBtn" type="button" class="btn btn-sm btn-secondary">Add date</button>
            <datalist id="dateOptions">
                <option th:each="d : ${dates}" th:value="${d}"></option>
            </datalist>
        </div>

        <div class="dsm-filter-input">
            <input id="dayCodeSearchInput" list="dayCodeOptions" type="text" placeholder="Search day code" aria-label="Search day code">
            <button id="addDayCodeFilterBtn" type="button" class="btn btn-sm btn-secondary">Add day code</button>
            <datalist id="dayCodeOptions">
                <option th:each="c : ${dayCodes}" th:value="${c}"></option>
            </datalist>
        </div>

        <span id="entryActiveFilters"></span>

        <span id="filterHint"
              class="filter-bar-empty">Use search boxes or &#x2295; in rows to filter in browser (max 10 each)</span>

        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
            <button id="clearEntryFiltersBtn" type="button" class="btn btn-sm btn-secondary">Clear all</button>
        </div>
    </div>

    <div class="card table-wrap">
        <div th:if="${entries.isEmpty()}" class="table-empty">No entries found. Run the scheduler to populate.</div>
        <table id="dsmEntriesTable" th:unless="${entries.isEmpty()}">
            <thead>
                <tr>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="ticker" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Ticker <span class="sort-indicator" data-for="ticker"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="dayCode" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Day Code <span class="sort-indicator" data-for="dayCode"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="date" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Date <span class="sort-indicator" data-for="date"></span>
                        </button>
                    </th>
                    <th>Open</th>
                    <th>Close</th>
                    <th>High</th>
                    <th>Low</th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="changePercent" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            Change % <span class="sort-indicator" data-for="changePercent"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="openChangePercent" style="padding:2px 8px;line-height:1.2;background:#dff5df;border:1px solid #9dd59d;color:#1f5d1f;">
                            OPENCHANGE% <span class="sort-indicator" data-for="openChangePercent"></span>
                        </button>
                    </th>
                    <th>Volume</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${entries}">
                    <td th:attr="data-sort-value=${e.ticker}">
                        <span class="badge badge-grey" th:text="${e.ticker}"></span>
                        <button type="button" class="filter-btn" data-field="ticker" th:data-value="${e.ticker}" title="Filter by ticker">&#x2295;</button>
                    </td>
                    <td th:attr="data-sort-value=${e.day_code}">
                        <code th:text="${e.day_code}"></code>
                        <button type="button" class="filter-btn" data-field="dayCode" th:data-value="${e.day_code}" title="Filter by day code">&#x2295;</button>
                    </td>
                    <td th:attr="data-sort-value=${e.master_event_date}">
                        <span th:text="${e.master_event_date}"></span>
                        <button type="button" class="filter-btn" data-field="date" th:data-value="${e.master_event_date}" title="Filter by date">&#x2295;</button>
                    </td>
                    <td th:text="${e.cur_day_open}"></td>
                    <td th:text="${e.cur_day_close}"></td>
                    <td th:text="${e.cur_day_high}"></td>
                    <td th:text="${e.cur_day_low}"></td>
                    <td th:attr="data-sort-value=${e.change_percent}" th:text="${e.change_percent}"></td>
                    <td th:attr="data-sort-value=${e.day_opening_change_percent}" th:text="${e.day_opening_change_percent}"></td>
                    <td th:text="${e.cur_day_volume}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var activeFiltersWrap = document.getElementById('entryActiveFilters');
            var filterHint = document.getElementById('filterHint');
            var table = document.getElementById('dsmEntriesTable');
            var clearBtn = document.getElementById('clearEntryFiltersBtn');
            var tickerSearchInput = document.getElementById('tickerSearchInput');
            var addTickerFilterBtn = document.getElementById('addTickerFilterBtn');
            var dateSearchInput = document.getElementById('dateSearchInput');
            var addDateFilterBtn = document.getElementById('addDateFilterBtn');
            var dayCodeSearchInput = document.getElementById('dayCodeSearchInput');
            var addDayCodeFilterBtn = document.getElementById('addDayCodeFilterBtn');
            var sortState = { key: null, dir: 'asc' };
            var filters = { ticker: [], dayCode: [], date: [] };

            if (!table) {
                return;
            }

            function renderActiveFilters() {
                activeFiltersWrap.innerHTML = '';
                ['ticker', 'dayCode', 'date'].forEach(function (field) {
                    filters[field].forEach(function (value) {
                        var chip = document.createElement('span');
                        chip.className = 'chip';

                        var typeSpan = document.createElement('span');
                        typeSpan.className = 'chip-type';
                        typeSpan.textContent = field;

                        var strong = document.createElement('strong');
                        strong.textContent = value;

                        var rmBtn = document.createElement('button');
                        rmBtn.type = 'button';
                        rmBtn.className = 'chip-remove';
                        rmBtn.title = 'Remove';
                        rmBtn.dataset.field = field;
                        rmBtn.dataset.value = value;
                        rmBtn.textContent = '\u2715';

                        chip.appendChild(typeSpan);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(strong);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(rmBtn);

                        activeFiltersWrap.appendChild(chip);
                    });
                });

                var hasAny = filters.ticker.length > 0 || filters.dayCode.length > 0 || filters.date.length > 0;
                filterHint.style.display = hasAny ? 'none' : '';
            }

            function applyFilters() {
                var rows = Array.from(table.querySelectorAll('tbody tr'));
                rows.forEach(function (row) {
                    var rowTicker = ((row.cells[0] && (row.cells[0].dataset.sortValue || row.cells[0].textContent)) || '').trim().toUpperCase();
                    var rowDayCode = ((row.cells[1] && (row.cells[1].dataset.sortValue || row.cells[1].textContent)) || '').trim().toUpperCase();
                    var rowDate = ((row.cells[2] && (row.cells[2].dataset.sortValue || row.cells[2].textContent)) || '').trim();

                    var tickerMatch = filters.ticker.length === 0 || filters.ticker.includes(rowTicker);
                    var dayCodeMatch = filters.dayCode.length === 0 || filters.dayCode.includes(rowDayCode);
                    var dateMatch = filters.date.length === 0 || filters.date.includes(rowDate);

                    row.style.display = tickerMatch && dayCodeMatch && dateMatch ? '' : 'none';
                });
            }

            function addFilter(field, value) {
                var normalized = (value || '').trim();
                if (!normalized) return;

                if (field === 'ticker' || field === 'dayCode') {
                    normalized = normalized.toUpperCase();
                }
                if (field === 'date' && !/^\d{4}-\d{2}-\d{2}$/.test(normalized)) {
                    return;
                }
                if (filters[field].includes(normalized)) return;
                if (filters[field].length >= 10) return;

                filters[field].push(normalized);
                renderActiveFilters();
                applyFilters();
            }

            function removeFilter(field, value) {
                filters[field] = filters[field].filter(function (v) { return v !== value; });
                renderActiveFilters();
                applyFilters();
            }

            if (addTickerFilterBtn) {
                addTickerFilterBtn.addEventListener('click', function () {
                    addFilter('ticker', tickerSearchInput ? tickerSearchInput.value : '');
                    if (tickerSearchInput) tickerSearchInput.value = '';
                });
            }

            if (tickerSearchInput) {
                tickerSearchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addFilter('ticker', tickerSearchInput.value);
                        tickerSearchInput.value = '';
                    }
                });
            }

            if (addDateFilterBtn) {
                addDateFilterBtn.addEventListener('click', function () {
                    addFilter('date', dateSearchInput ? dateSearchInput.value : '');
                    if (dateSearchInput) dateSearchInput.value = '';
                });
            }

            if (dateSearchInput) {
                dateSearchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addFilter('date', dateSearchInput.value);
                        dateSearchInput.value = '';
                    }
                });
            }

            if (addDayCodeFilterBtn) {
                addDayCodeFilterBtn.addEventListener('click', function () {
                    addFilter('dayCode', dayCodeSearchInput ? dayCodeSearchInput.value : '');
                    if (dayCodeSearchInput) dayCodeSearchInput.value = '';
                });
            }

            if (dayCodeSearchInput) {
                dayCodeSearchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addFilter('dayCode', dayCodeSearchInput.value);
                        dayCodeSearchInput.value = '';
                    }
                });
            }

            function compareValues(a, b, sortKey) {
                if (sortKey === 'date') {
                    var da = Date.parse(a || '');
                    var db = Date.parse(b || '');
                    if (isNaN(da) && isNaN(db)) return 0;
                    if (isNaN(da)) return -1;
                    if (isNaN(db)) return 1;
                    return da - db;
                }
                if (sortKey === 'changePercent' || sortKey === 'openChangePercent') {
                    var na = parseFloat(a);
                    var nb = parseFloat(b);
                    if (isNaN(na) && isNaN(nb)) return 0;
                    if (isNaN(na)) return -1;
                    if (isNaN(nb)) return 1;
                    return na - nb;
                }
                return String(a || '').localeCompare(String(b || ''), undefined, { sensitivity: 'base' });
            }

            function updateSortIndicators() {
                document.querySelectorAll('.sort-indicator').forEach(function (el) {
                    var key = el.dataset.for;
                    if (sortState.key !== key) {
                        el.textContent = '';
                        return;
                    }
                    el.textContent = sortState.dir === 'asc' ? '\u2191' : '\u2193';
                });
            }

            function sortTable(sortKey) {
                if (!table) return;
                var tbody = table.querySelector('tbody');
                if (!tbody) return;

                if (sortState.key === sortKey) {
                    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState.key = sortKey;
                    sortState.dir = 'asc';
                }

                var indexByKey = { ticker: 0, dayCode: 1, date: 2, changePercent: 7, openChangePercent: 8 };
                var colIndex = indexByKey[sortKey];
                var rows = Array.from(tbody.querySelectorAll('tr'));

                rows.sort(function (r1, r2) {
                    var v1 = (r1.children[colIndex] && r1.children[colIndex].dataset.sortValue) || '';
                    var v2 = (r2.children[colIndex] && r2.children[colIndex].dataset.sortValue) || '';
                    var cmp = compareValues(v1, v2, sortKey);
                    return sortState.dir === 'asc' ? cmp : -cmp;
                });

                rows.forEach(function (row) { tbody.appendChild(row); });
                updateSortIndicators();
            }

            document.querySelectorAll('.table-sort-btn[data-sort-key]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    sortTable(btn.dataset.sortKey);
                });
            });

            document.addEventListener('click', function (e) {
                var rm = e.target.closest('.chip-remove[data-field]');
                if (rm && rm.closest('#entryActiveFilters')) {
                    removeFilter(rm.dataset.field, rm.dataset.value);
                    return;
                }

                var add = e.target.closest('.filter-btn[data-field]');
                if (add) {
                    addFilter(add.dataset.field, add.dataset.value);
                }
            });

            if (clearBtn) {
                clearBtn.addEventListener('click', function () {
                    filters.ticker = [];
                    filters.dayCode = [];
                    filters.date = [];
                    renderActiveFilters();
                    applyFilters();
                });
            }

            renderActiveFilters();
            applyFilters();
        })();
    </script>
</div>
</body>
</html>
