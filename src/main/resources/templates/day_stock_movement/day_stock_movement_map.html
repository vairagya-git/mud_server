<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Day Stock Movement Mappings</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 12px }
        table { border-collapse: collapse; width: 100%; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 8px; text-align: left }
        form { margin-top: 12px }
    </style>
    <script>
        function filterOptions(inputId, listId) {
            var input = document.getElementById(inputId);
            var list = document.getElementById(listId);
            var filter = input.value.toLowerCase();
            for (var i=0;i<list.options.length;i++){
                var opt = list.options[i];
                opt.style.display = opt.value.toLowerCase().indexOf(filter) === -1 ? 'none' : '';
            }
        }
    </script>
</head>
<body>
<h1>Day Stock Movement Mappings</h1>

<div th:if="${marketClosedWarning}" style="color:orange;border:1px solid orange;padding:8px;margin-bottom:12px">
    <strong>Market Closed:</strong> <span th:text="${marketClosedWarning}"></span>
</div>
<div th:if="${bulkMessage}" style="color:green;border:1px solid green;padding:8px;margin-bottom:12px">
    <span th:text="${bulkMessage}"></span>
</div>

<h2>Existing Mappings</h2>
<table>
    <thead>
    <tr><th>Stock</th><th>Movement Key Code</th><th>Event Date</th><th>Status</th></tr>
    </thead>
    <tbody>
    <tr th:each="m : ${mappings}">
        <td th:text="${m.ticker}">TICKER</td>
        <td th:text="${m.code}">CODE</td>
        <td th:text="${m.date}">2026-06-08</td>
        <td th:text="${m.status}">STATUS</td>
    </tr>
    <tr th:if="${mappings.size()} == 0"><td colspan="4">No mappings</td></tr>
    </tbody>
</table>

<h2>Add Mapping</h2>
<form th:action="@{/day-stock-movement/mapping}" method="post">
    <div>
        <label>Ticker: <input type="text" id="tickerInput" name="ticker" list="tickers" oninput="filterOptions('tickerInput','tickers')" required /></label>
        <datalist id="tickers">
            <option th:each="s : ${stocks}" th:value="${s.ticker}" th:text="${s.ticker}"></option>
        </datalist>
    </div>
    <div>
        <label>Movement Key Code: <input type="text" id="codeInput" name="code" list="daycodes" oninput="filterOptions('codeInput','daycodes')" required /></label>
        <datalist id="daycodes">
            <option th:each="d : ${days}" th:value="${d.code}" th:text="${d.code}"></option>
        </datalist>
    </div>
    <div style="margin-top:8px">
        <button type="submit">Add Mapping</button>
        <a th:href="@{/day-stock-movement/mapping/bulk}">Bulk Upload</a>
    </div>
</form>

</body>
</html>
