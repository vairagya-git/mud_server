<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>DSM Mapping — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Day Stock Movement Mapping</h1>
        <div class="subtitle">Assign stocks to a movement key.</div>
    </div>
    <div th:if="${marketClosedWarning}" class="alert alert-error" th:text="${marketClosedWarning}"></div>
    <div class="card" style="max-width:540px">
        <form th:action="@{/day-stock-movement/mapping}" method="post">
            <div class="form-group">
                <label>Key (Code)</label>
                <select name="code" required>
                    <option value="">-- select --</option>
                    <option th:each="k : ${days}" th:value="${k.code}" th:text="${k.code} + ' (' + ${k.date != null ? k.date : 'no date'} + ')'"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Stock Ticker</label>
                <input type="text" name="ticker" placeholder="AAPL" required />
            </div>
            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Save Mapping</button>
                <a href="/day-stock-movement" hx-get="/day-stock-movement" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
    <div class="card table-wrap" style="margin-top:24px">
        <h3 style="margin-bottom:12px">Current Mappings</h3>
        <div th:if="${mappings.isEmpty()}" class="table-empty">No mappings yet.</div>

        <div th:unless="${mappings.isEmpty()}" class="filter-bar" style="margin-bottom:12px">
            <span class="filter-bar-label">Filters</span>

            <div style="display:inline-flex;align-items:center;gap:6px;margin-left:6px;">
                <input id="mappingTickerSearch" list="mappingTickerOptions" type="text" placeholder="Search ticker" aria-label="Search ticker"
                       style="width:130px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;text-transform:uppercase;">
                <button id="addMappingTickerBtn" type="button" class="btn btn-sm btn-secondary">Add ticker</button>
                <datalist id="mappingTickerOptions">
                    <option th:each="s : ${stocks}" th:value="${s.ticker}"></option>
                </datalist>
            </div>

            <span id="mappingActiveFilters"></span>

            <span id="mappingFilterHint" class="filter-bar-empty">Use ticker search or + buttons in table for ticker/dayCode</span>

            <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
                <button id="clearMappingFiltersBtn" type="button" class="btn btn-sm btn-secondary">Clear all</button>
            </div>
        </div>

        <table id="mappingTable" th:unless="${mappings.isEmpty()}">
            <thead><tr><th>Day Code</th><th>Date</th><th>Ticker</th><th>Status</th></tr></thead>
            <tbody>
                <tr th:each="m : ${mappings}" th:attr="data-day-code=${m.code},data-ticker=${m.ticker}">
                    <td>
                        <code th:text="${m.code}"></code>
                        <button type="button" class="filter-btn" data-field="dayCode" th:data-value="${m.code}" title="Filter by day code">&#x2295;</button>
                    </td>
                    <td th:text="${m.date != null ? m.date : '&#8212;'}"></td>
                    <td>
                        <span class="badge badge-grey" th:text="${m.ticker}"></span>
                        <button type="button" class="filter-btn" data-field="ticker" th:data-value="${m.ticker}" title="Filter by ticker">&#x2295;</button>
                    </td>
                    <td><span class="badge badge-blue" th:text="${m.status}"></span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var table = document.getElementById('mappingTable');
            if (!table) return;

            var tickerSearch = document.getElementById('mappingTickerSearch');
            var addTickerBtn = document.getElementById('addMappingTickerBtn');
            var activeFiltersWrap = document.getElementById('mappingActiveFilters');
            var hint = document.getElementById('mappingFilterHint');
            var clearBtn = document.getElementById('clearMappingFiltersBtn');
            var tickerOptions = document.getElementById('mappingTickerOptions');

            var filters = { ticker: [], dayCode: [] };

            function dedupeTickerOptions() {
                if (!tickerOptions) return;
                var seen = new Set();
                Array.from(tickerOptions.querySelectorAll('option')).forEach(function (opt) {
                    var value = normalize('ticker', opt.value);
                    if (!value || seen.has(value)) {
                        opt.remove();
                        return;
                    }
                    seen.add(value);
                    opt.value = value;
                });
            }

            function normalize(field, value) {
                var v = (value || '').trim();
                if (!v) return '';
                return field === 'ticker' ? v.toUpperCase() : v;
            }

            function renderChips() {
                activeFiltersWrap.innerHTML = '';
                ['ticker', 'dayCode'].forEach(function (field) {
                    filters[field].forEach(function (value) {
                        var chip = document.createElement('span');
                        chip.className = 'chip';

                        var typeSpan = document.createElement('span');
                        typeSpan.className = 'chip-type';
                        typeSpan.textContent = field;

                        var strong = document.createElement('strong');
                        strong.textContent = value;

                        var rm = document.createElement('button');
                        rm.type = 'button';
                        rm.className = 'chip-remove';
                        rm.dataset.field = field;
                        rm.dataset.value = value;
                        rm.title = 'Remove';
                        rm.textContent = '\u2715';

                        chip.appendChild(typeSpan);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(strong);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(rm);
                        activeFiltersWrap.appendChild(chip);
                    });
                });

                var hasAny = filters.ticker.length > 0 || filters.dayCode.length > 0;
                if (hint) hint.style.display = hasAny ? 'none' : '';
            }

            function applyFilters() {
                var rows = Array.from(table.tBodies[0].rows);
                rows.forEach(function (row) {
                    var rowTicker = normalize('ticker', row.dataset.ticker || '');
                    var rowDayCode = normalize('dayCode', row.dataset.dayCode || '');

                    var tickerMatch = filters.ticker.length === 0 || filters.ticker.includes(rowTicker);
                    var dayCodeMatch = filters.dayCode.length === 0 || filters.dayCode.includes(rowDayCode);

                    row.style.display = (tickerMatch && dayCodeMatch) ? '' : 'none';
                });
            }

            function addFilter(field, value) {
                var normalized = normalize(field, value);
                if (!normalized) return;
                if (!filters[field].includes(normalized)) {
                    filters[field].push(normalized);
                    renderChips();
                    applyFilters();
                }
            }

            function removeFilter(field, value) {
                filters[field] = filters[field].filter(function (v) { return v !== value; });
                renderChips();
                applyFilters();
            }

            addTickerBtn.addEventListener('click', function () {
                addFilter('ticker', tickerSearch.value);
                tickerSearch.value = '';
            });

            tickerSearch.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addFilter('ticker', tickerSearch.value);
                    tickerSearch.value = '';
                }
            });

            clearBtn.addEventListener('click', function () {
                filters.ticker = [];
                filters.dayCode = [];
                renderChips();
                applyFilters();
            });

            document.addEventListener('click', function (e) {
                var add = e.target.closest('.filter-btn[data-field]');
                if (add) {
                    addFilter(add.dataset.field, add.dataset.value);
                    return;
                }

                var rm = e.target.closest('.chip-remove[data-field]');
                if (rm && rm.closest('#mappingActiveFilters')) {
                    removeFilter(rm.dataset.field, rm.dataset.value);
                }
            });

            dedupeTickerOptions();
        })();
    </script>
</div>
</body>
</html>
