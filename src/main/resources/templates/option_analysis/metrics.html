<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Option Metrics — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header table-sticky-header">
        <h1>Option Metrics</h1>
        <div class="subtitle">Metrics. Total: <strong th:text="${metrics.size()}">0</strong></div>
    </div>

    <div class="filter-bar table-sticky-filter" style="margin-bottom:16px">
        <span class="filter-bar-label">Filters</span>

        <div class="table-filter-input">
            <input id="metricsTickerInput" class="table-filter-input-uppercase" list="metricsTickerOptions" type="text" placeholder="Search ticker" aria-label="Search ticker">
            <button id="addMetricsTickerFilterBtn" type="button" class="btn btn-sm btn-secondary">Add ticker</button>
            <datalist id="metricsTickerOptions">
                <option th:each="m : ${metrics}" th:value="${m.ticker}"></option>
            </datalist>
        </div>

        <div class="table-filter-input">
            <input id="metricsIvDateInput" list="metricsIvDateOptions" type="text" placeholder="IV date" aria-label="Filter by IV date">
            <button id="addMetricsIvDateFilterBtn" type="button" class="btn btn-sm btn-secondary">Add date</button>
            <datalist id="metricsIvDateOptions">
                <option th:each="m : ${metrics}" th:value="${m.iv_date}"></option>
            </datalist>
        </div>

        <div class="table-filter-input">
            <input id="metricsContractTickerInput" list="metricsContractTickerOptions" type="text" placeholder="Contract ticker" aria-label="Filter by contract ticker">
            <button id="addMetricsContractTickerFilterBtn" type="button" class="btn btn-sm btn-secondary">Add contract</button>
            <datalist id="metricsContractTickerOptions">
                <option th:each="m : ${metrics}" th:value="${m.contract_ticker}"></option>
            </datalist>
        </div>

        <div class="table-filter-input">
            <input id="metricsStrikeInput" list="metricsStrikeOptions" type="text" placeholder="Strike" aria-label="Filter by strike">
            <button id="addMetricsStrikeFilterBtn" type="button" class="btn btn-sm btn-secondary">Add strike</button>
            <datalist id="metricsStrikeOptions">
                <option th:each="m : ${metrics}" th:value="${m.strike_price}"></option>
            </datalist>
        </div>

        <span id="metricsActiveFilters"></span>

        <span id="metricsFilterHint" class="filter-bar-empty">Filter by ticker, IV date, contract ticker, or strike. Sorting stays in the browser.</span>

        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
            <button id="clearMetricsFiltersBtn" type="button" class="btn btn-sm btn-secondary">Clear all</button>
        </div>
    </div>

    <div class="card table-wrap">
        <div th:if="${metrics.isEmpty()}" class="table-empty">No option IV metrics found.</div>
        <table id="optionMetricsTable" th:unless="${metrics.isEmpty()}">
            <thead>
                <tr>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="ticker">
                            Ticker <span class="sort-indicator" data-for="ticker"></span>
                        </button>
                    </th>
                    <th>Contract Ticker</th>
                    <th>Type</th>
                    <th>Expiration</th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="strikePrice">
                            Strike <span class="sort-indicator" data-for="strikePrice"></span>
                        </button>
                    </th>
                    <th>
                        <button type="button" class="btn btn-sm table-sort-btn" data-sort-key="ivDate">
                            IV Date <span class="sort-indicator" data-for="ivDate"></span>
                        </button>
                    </th>
                    <th>Max IV</th>
                    <th>Max IV Time</th>
                    <th>Max IV Stock Distance</th>
                    <th>Min IV</th>
                    <th>Min IV Time</th>
                    <th>Min IV Stock Distance</th>
                    <th>Updated At</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${metrics}">
                    <td th:attr="data-sort-value=${m.ticker},data-filter-value=${m.ticker}">
                        <span class="badge badge-grey" th:text="${m.ticker}"></span>
                    </td>
                    <td th:attr="data-filter-value=${m.contract_ticker}"><code th:text="${m.contract_ticker}"></code></td>
                    <td th:text="${m.contract_type}"></td>
                    <td th:text="${m.expiration_date}"></td>
                    <td th:attr="data-sort-value=${m.strike_price},data-filter-value=${m.strike_price}" th:text="${m.strike_price}"></td>
                    <td th:attr="data-sort-value=${m.iv_date},data-filter-value=${m.iv_date}" th:text="${m.iv_date}"></td>
                    <td th:text="${m.max_iv}"></td>
                    <td th:text="${m.max_iv_time}"></td>
                    <td th:text="${m.max_iv_stock_distance}"></td>
                    <td th:text="${m.min_iv}"></td>
                    <td th:text="${m.min_iv_time}"></td>
                    <td th:text="${m.min_iv_stock_distance}"></td>
                    <td th:text="${m.updated_at}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var table = document.getElementById('optionMetricsTable');
            if (!table) return;

            var tickerInput = document.getElementById('metricsTickerInput');
            var ivDateInput = document.getElementById('metricsIvDateInput');
            var contractTickerInput = document.getElementById('metricsContractTickerInput');
            var strikeInput = document.getElementById('metricsStrikeInput');
            var addTickerBtn = document.getElementById('addMetricsTickerFilterBtn');
            var addIvDateBtn = document.getElementById('addMetricsIvDateFilterBtn');
            var addContractTickerBtn = document.getElementById('addMetricsContractTickerFilterBtn');
            var addStrikeBtn = document.getElementById('addMetricsStrikeFilterBtn');
            var activeFiltersWrap = document.getElementById('metricsActiveFilters');
            var filterHint = document.getElementById('metricsFilterHint');
            var clearFiltersBtn = document.getElementById('clearMetricsFiltersBtn');
            var sortState = { key: null, dir: 'asc' };
            var filters = { ticker: [], ivDate: [], contractTicker: [], strikePrice: [] };

            function normalizeValue(field, value) {
                var normalized = (value || '').trim();
                if (field === 'ticker' || field === 'contractTicker') {
                    normalized = normalized.toUpperCase();
                }
                return normalized;
            }

            function dedupeFilterOptions() {
                var tickerOptions = document.getElementById('metricsTickerOptions');
                var ivDateOptions = document.getElementById('metricsIvDateOptions');
                var contractTickerOptions = document.getElementById('metricsContractTickerOptions');
                var strikeOptions = document.getElementById('metricsStrikeOptions');

                dedupeOptionList(tickerOptions, 'ticker');
                dedupeOptionList(ivDateOptions, 'ivDate');
                dedupeOptionList(contractTickerOptions, 'contractTicker');
                dedupeOptionList(strikeOptions, 'strikePrice');
            }

            function dedupeOptionList(optionList, field) {
                if (!optionList) {
                    return;
                }

                var seenValues = new Set();
                Array.from(optionList.querySelectorAll('option')).forEach(function (opt) {
                    var value = normalizeValue(field, opt.value);
                    if (!value || seenValues.has(value)) {
                        opt.remove();
                        return;
                    }
                    seenValues.add(value);
                    opt.value = value;
                });
            }

            function renderFilterChips() {
                activeFiltersWrap.innerHTML = '';
                Object.keys(filters).forEach(function (field) {
                    filters[field].forEach(function (value) {
                        var chip = document.createElement('span');
                        chip.className = 'chip';

                        var typeSpan = document.createElement('span');
                        typeSpan.className = 'chip-type';
                        typeSpan.textContent = field;

                        var strong = document.createElement('strong');
                        strong.textContent = value;

                        var rmBtn = document.createElement('button');
                        rmBtn.type = 'button';
                        rmBtn.className = 'chip-remove';
                        rmBtn.title = 'Remove';
                        rmBtn.dataset.field = field;
                        rmBtn.dataset.value = value;
                        rmBtn.textContent = '\u2715';

                        chip.appendChild(typeSpan);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(strong);
                        chip.appendChild(document.createTextNode('\u00a0'));
                        chip.appendChild(rmBtn);
                        activeFiltersWrap.appendChild(chip);
                    });
                });

                filterHint.style.display = activeFiltersWrap.children.length === 0 ? '' : 'none';
            }

            function addFilter(field, value) {
                var normalized = normalizeValue(field, value);
                if (!normalized) return;
                if (!filters[field].includes(normalized)) {
                    filters[field].push(normalized);
                    renderFilterChips();
                    applyFilters();
                }
            }

            function applyFilters() {
                var rows = Array.from(table.tBodies[0].rows);
                rows.forEach(function (row) {
                    var ticker = normalizeValue('ticker', row.children[0].dataset.filterValue || '');
                    var contractTicker = normalizeValue('contractTicker', row.children[1].dataset.filterValue || '');
                    var strikePrice = normalizeValue('strikePrice', row.children[4].dataset.filterValue || '');
                    var ivDate = normalizeValue('ivDate', row.children[5].dataset.filterValue || '');
                    var show = true;

                    if (filters.ticker.length > 0 && !filters.ticker.includes(ticker)) {
                        show = false;
                    }
                    if (show && filters.contractTicker.length > 0 && !filters.contractTicker.includes(contractTicker)) {
                        show = false;
                    }
                    if (show && filters.strikePrice.length > 0 && !filters.strikePrice.includes(strikePrice)) {
                        show = false;
                    }
                    if (show && filters.ivDate.length > 0 && !filters.ivDate.includes(ivDate)) {
                        show = false;
                    }

                    row.style.display = show ? '' : 'none';
                });
            }

            function removeFilter(field, value) {
                filters[field] = filters[field].filter(function (entry) { return entry !== value; });
                renderFilterChips();
                applyFilters();
            }

            function parseSortValue(row, key) {
                if (key === 'ticker') {
                    return (row.children[0].dataset.sortValue || '').toLowerCase();
                }
                if (key === 'strikePrice') {
                    return Number(row.children[4].dataset.sortValue || 0);
                }
                if (key === 'ivDate') {
                    var dateText = row.children[5].dataset.sortValue || '';
                    var timestamp = Date.parse(dateText);
                    return Number.isNaN(timestamp) ? Number.NEGATIVE_INFINITY : timestamp;
                }
                return '';
            }

            function updateSortIndicators() {
                document.querySelectorAll('.sort-indicator').forEach(function (el) {
                    if (sortState.key !== el.dataset.for) {
                        el.textContent = '';
                        return;
                    }
                    el.textContent = sortState.dir === 'asc' ? '\u2191' : '\u2193';
                });
            }

            function sortTable(key) {
                var tbody = table.tBodies[0];
                if (!tbody) return;

                if (sortState.key === key) {
                    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState.key = key;
                    sortState.dir = 'asc';
                }

                var rows = Array.from(tbody.rows);
                rows.sort(function (a, b) {
                    var av = parseSortValue(a, key);
                    var bv = parseSortValue(b, key);
                    if (av < bv) return sortState.dir === 'asc' ? -1 : 1;
                    if (av > bv) return sortState.dir === 'asc' ? 1 : -1;
                    return 0;
                });

                rows.forEach(function (row) { tbody.appendChild(row); });
                updateSortIndicators();
                applyFilters();
            }

            addTickerBtn.addEventListener('click', function () {
                addFilter('ticker', tickerInput.value);
                tickerInput.value = '';
            });
            addIvDateBtn.addEventListener('click', function () {
                addFilter('ivDate', ivDateInput.value);
                ivDateInput.value = '';
            });
            addContractTickerBtn.addEventListener('click', function () {
                addFilter('contractTicker', contractTickerInput.value);
                contractTickerInput.value = '';
            });
            addStrikeBtn.addEventListener('click', function () {
                addFilter('strikePrice', strikeInput.value);
                strikeInput.value = '';
            });

            [tickerInput, ivDateInput, contractTickerInput, strikeInput].forEach(function (input) {
                input.addEventListener('keydown', function (e) {
                    if (e.key !== 'Enter') return;
                    e.preventDefault();
                    if (input === tickerInput) {
                        addFilter('ticker', tickerInput.value);
                        tickerInput.value = '';
                    } else if (input === ivDateInput) {
                        addFilter('ivDate', ivDateInput.value);
                        ivDateInput.value = '';
                    } else if (input === strikeInput) {
                        addFilter('strikePrice', strikeInput.value);
                        strikeInput.value = '';
                    } else {
                        addFilter('contractTicker', contractTickerInput.value);
                        contractTickerInput.value = '';
                    }
                });
            });

            activeFiltersWrap.addEventListener('click', function (e) {
                var removeBtn = e.target.closest('.chip-remove');
                if (!removeBtn) return;
                removeFilter(removeBtn.dataset.field, removeBtn.dataset.value);
            });

            clearFiltersBtn.addEventListener('click', function () {
                filters = { ticker: [], ivDate: [], contractTicker: [], strikePrice: [] };
                renderFilterChips();
                applyFilters();
            });

            document.querySelectorAll('.table-sort-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    sortTable(btn.dataset.sortKey);
                });
            });

            dedupeFilterOptions();
            renderFilterChips();
            applyFilters();
        }());
    </script>
</div>
</body>
</html>
