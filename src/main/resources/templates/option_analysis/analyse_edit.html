<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Edit Option Analysis — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Option Analysis</h1>
        <div class="subtitle">Edit entry</div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card" style="max-width:760px">
        <form id="optionAnalyseEditForm" th:action="@{/option-analysis/analyse/{id}/edit(id=${entry.id})}" method="post">
            <input type="hidden" id="stockIdField" name="stockId" th:value="${entry.stock_id}" required>
            <input type="hidden" id="statusValue" name="status" th:value="${entry.status}">

            <div class="form-group">
                <label>Stock (Ticker)</label>
                <input id="stockTickerInput" list="stockTickerOptions" type="text" placeholder="Search ticker" autocomplete="off" th:value="${entry.ticker}" required>
                <datalist id="stockTickerOptions">
                    <option th:each="s : ${stocks}" th:value="${s.ticker}" th:data-stock-id="${s.id}"></option>
                </datalist>
                <small id="stockHint" style="color:var(--text-muted)">Type a ticker and select from suggestions.</small>
            </div>

            <div class="form-group">
                <label>Contract Type</label>
                <select name="contractType" required>
                    <option value="CALL" th:selected="${entry.contract_type == 'CALL'}">CALL</option>
                    <option value="PUT" th:selected="${entry.contract_type == 'PUT'}">PUT</option>
                    <option value="BOTH" th:selected="${entry.contract_type == 'BOTH'}">BOTH</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="statusSelect" name="status" required>
                    <th:block th:if="${entry.status == 'ACTIVE'}">
                        <option value="CLOSE" selected>CLOSE</option>
                    </th:block>
                    <th:block th:unless="${entry.status == 'ACTIVE'}">
                        <option value="CREATE_CONTRACT" th:selected="${entry.status == 'CREATE_CONTRACT'}">CREATE_CONTRACT</option>
                        <option value="ACTIVE" th:selected="${entry.status == 'ACTIVE'}">ACTIVE</option>
                        <option value="CLOSE" th:selected="${entry.status == 'CLOSE'}">CLOSE</option>
                        <option value="COMPLETED" th:selected="${entry.status == 'COMPLETED'}">COMPLETED</option>
                    </th:block>
                </select>
                <small style="color:var(--text-muted)">When current status is ACTIVE, the only allowed next status is CLOSE.</small>
            </div>

            <div class="form-group">
                <label>Expiration Date</label>
                <input type="date" name="expirationDate" th:value="${entry.expiration_date}" required>
            </div>

            <div class="form-group">
                <label>Strike From</label>
                <input type="number" name="strikeFrom" step="0.0001" min="0" th:value="${entry.strike_from}" required>
            </div>

            <div class="form-group">
                <label>Strike To</label>
                <input type="number" name="strikeTo" step="0.0001" min="0" th:value="${entry.strike_to}" required>
            </div>

            <div class="form-group">
                <label>Interval</label>
                <input type="number" name="interval" step="0.01" min="0" th:value="${entry.interval}" required>
            </div>

            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Update</button>
                <a href="/option-analysis/analyse" hx-get="/option-analysis/analyse" hx-target="#page-content" hx-swap="outerHTML" hx-push-url="true" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        (function () {
            var form = document.getElementById('optionAnalyseEditForm');
            var tickerInput = document.getElementById('stockTickerInput');
            var stockIdField = document.getElementById('stockIdField');
            var stockHint = document.getElementById('stockHint');
            var statusSelect = document.getElementById('statusSelect');
            var statusValue = document.getElementById('statusValue');

            function syncStatus() {
                var value = (statusSelect.value || 'CREATE_CONTRACT').trim().toUpperCase();
                statusValue.value = value;
            }

            function syncStockId() {
                var ticker = (tickerInput.value || '').trim();
                if (!ticker) {
                    stockIdField.value = '';
                    stockHint.textContent = 'Type a ticker and select from suggestions.';
                    return;
                }

                var option = document.querySelector('#stockTickerOptions option[value="' + CSS.escape(ticker) + '"]');
                if (!option) {
                    stockIdField.value = '';
                    stockHint.textContent = 'Ticker not found. Please select a valid ticker from suggestions.';
                    return;
                }

                stockIdField.value = option.dataset.stockId || '';
                stockHint.textContent = stockIdField.value ? 'Selected stock_id: ' + stockIdField.value : 'Ticker selected.';
            }

            statusSelect.addEventListener('change', syncStatus);
            tickerInput.addEventListener('input', syncStockId);
            tickerInput.addEventListener('change', syncStockId);

            form.addEventListener('submit', function (e) {
                syncStockId();
                syncStatus();
                if (!stockIdField.value) {
                    e.preventDefault();
                    stockHint.textContent = 'Please select a valid ticker from suggestions before updating.';
                }
            });

            syncStatus();
            syncStockId();
        })();
    </script>
</div>
</body>
</html>
