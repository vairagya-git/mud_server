<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#page-content})}">
<head><title>Option Analysis — MudStock</title></head>
<body>
<div id="page-content" th:fragment="content">
    <div class="page-header">
        <h1>Option Analysis</h1>
        <div class="subtitle">Analyse</div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card" style="max-width:760px">
        <form id="optionAnalyseForm" th:action="@{/option-analysis/analyse}" method="post">
            <input type="hidden" id="stockIdField" name="stockId" required>
            <input type="hidden" id="statusValue" name="status" value="FALSE">

            <div class="form-group">
                <label>Stock (Ticker)</label>
                <input id="stockTickerInput" list="stockTickerOptions" type="text" placeholder="Search ticker" autocomplete="off" required>
                <datalist id="stockTickerOptions">
                    <option th:each="s : ${stocks}" th:value="${s.ticker}" th:data-stock-id="${s.id}"></option>
                </datalist>
                <small id="stockHint" style="color:var(--text-muted)">Type a ticker and select from suggestions.</small>
            </div>

            <div class="form-group">
                <label>Contract Type</label>
                <select name="contractType" required>
                    <option value="CALL">CALL</option>
                    <option value="PUT">PUT</option>
                    <option value="BOTH">BOTH</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <div style="display:flex;align-items:center;gap:10px;">
                    <label style="display:flex;align-items:center;gap:8px;margin:0;">
                        <input id="statusToggle" type="checkbox">
                        <span>TRUE</span>
                    </label>
                    <span style="font-size:.84rem;color:var(--text-muted)">Current value: <strong id="statusLabel">FALSE</strong></span>
                </div>
            </div>

            <div class="form-group">
                <label>Expiration Date</label>
                <input type="date" name="expirationDate" required>
            </div>

            <div class="form-group">
                <label>Strike From</label>
                <input type="number" name="strikeFrom" step="0.0001" min="0" required>
            </div>

            <div class="form-group">
                <label>Strike To</label>
                <input type="number" name="strikeTo" step="0.0001" min="0" required>
            </div>

            <div class="form-group">
                <label>Interval</label>
                <input type="number" name="interval" step="0.01" min="0" required>
            </div>

            <div class="actions-bar" style="margin-top:20px">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <div class="card table-wrap" style="margin-top:24px">
        <h3 style="margin-bottom:12px">Current Entries</h3>
        <div th:if="${entries.isEmpty()}" class="table-empty">No option analysis entries yet.</div>
        <table th:unless="${entries.isEmpty()}">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Contract</th>
                    <th>Status</th>
                    <th>Expiration</th>
                    <th>Strike From</th>
                    <th>Strike To</th>
                    <th>Interval</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${entries}">
                    <td><span class="badge badge-grey" th:text="${e.ticker}"></span></td>
                    <td th:text="${e.contract_type}"></td>
                    <td th:text="${e.status}"></td>
                    <td th:text="${e.expiration_date}"></td>
                    <td th:text="${e.strike_from}"></td>
                    <td th:text="${e.strike_to}"></td>
                    <td th:text="${e.interval}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var form = document.getElementById('optionAnalyseForm');
            var tickerInput = document.getElementById('stockTickerInput');
            var stockIdField = document.getElementById('stockIdField');
            var stockHint = document.getElementById('stockHint');
            var statusToggle = document.getElementById('statusToggle');
            var statusValue = document.getElementById('statusValue');
            var statusLabel = document.getElementById('statusLabel');

            function syncStatus() {
                var value = statusToggle.checked ? 'TRUE' : 'FALSE';
                statusValue.value = value;
                statusLabel.textContent = value;
            }

            function syncStockId() {
                var ticker = (tickerInput.value || '').trim();
                if (!ticker) {
                    stockIdField.value = '';
                    stockHint.textContent = 'Type a ticker and select from suggestions.';
                    return;
                }

                var option = document.querySelector('#stockTickerOptions option[value="' + CSS.escape(ticker) + '"]');
                if (!option) {
                    stockIdField.value = '';
                    stockHint.textContent = 'Ticker not found. Please select a valid ticker from suggestions.';
                    return;
                }

                stockIdField.value = option.dataset.stockId || '';
                stockHint.textContent = stockIdField.value ? 'Selected stock_id: ' + stockIdField.value : 'Ticker selected.';
            }

            statusToggle.addEventListener('change', syncStatus);
            tickerInput.addEventListener('input', syncStockId);
            tickerInput.addEventListener('change', syncStockId);

            form.addEventListener('submit', function (e) {
                syncStockId();
                syncStatus();
                if (!stockIdField.value) {
                    e.preventDefault();
                    stockHint.textContent = 'Please select a valid ticker from suggestions before saving.';
                }
            });

            syncStatus();
        })();
    </script>
</div>
</body>
</html>
