spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8085
  error:
    include-stacktrace: ALWAYS

alphavantage:
  function: TIME_SERIES_DAILY
  apikey: ${ALPHA_VANTAGE_API_KEY:ISIX6TNS4RRINGGI}

# Cron expression for earnings poll (Spring cron with seconds field)
earnings:
  cron: "0 0/1 * * * *" # every 5 minutes
  api:
    calls-per-minute: 1000

dayevent:
  cron: "0 0/2 * * * *" # every 2 minutes

massive:
  base-url: https://api.massive.com/
  open-close: v1/open-close/%s/%s/%s?adjusted=true&apiKey=%s
  ticker-aggregate: /v2/aggs/ticker/%s/range/1/day/%s%s
  apikey: ${MASSIVE_API_KEY:0jSwNlbvfYIgQ8OAVJsZ7T1sEmpWm7JV}
