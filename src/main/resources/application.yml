spring:
  profiles:
    active: 
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8085
  error:
    include-stacktrace: ALWAYS

alphavantage:
  function: TIME_SERIES_DAILY
  apikey: ${ALPHA_VANTAGE_API_KEY:ISIX6TNS4RRINGGI}

massive:
  base-url: https://api.massive.com/
  open-close: v1/open-close/%s/%s/%s?adjusted=true&apiKey=%s
  ticker-aggregate: /v2/aggs/ticker/%s/range/1/day/%s/%s?adjusted=true&apiKey=%s
  apikey: ${MASSIVE_API_KEY:0jSwNlbvfYIgQ8OAVJsZ7T1sEmpWm7JV}

# Watchlist (by watchlist.code) used by the every-day-event job and the manual date form.
everyday-watchlist-code: "MOVING_STOCK"


python:
# Python Service Local Instance url
  yfinance-url: http://localhost:8087/
  ticker: ticker/%s
master:
  tables:
    - master_market_holidays
